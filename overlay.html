<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; }
    html, body {
      background: transparent;
      overflow: hidden;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: no-drag;
    }

    .eyes-container {
      display: flex;
      gap: 14px;
      animation: pop-in 0.3s ease-out forwards;
    }

    /* ── Base eye ── */
    .eye {
      width: 44px;
      height: 44px;
      background: #fff;
      border-radius: 50% 50% 49% 51% / 67% 68% 32% 33%;
      position: relative;
      box-shadow: inset -3px -3px 6px rgba(0,0,0,0.12), 0 2px 12px rgba(0,0,0,0.25);
      overflow: hidden;
    }
    .eye::before {
      content: '';
      position: absolute;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, #5c8abf 0%, #3a6fa0 40%, #1a3a5c 100%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .eye::after {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #1a1a2e 0%, #000 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: inset -1px -1px 2px rgba(255,255,255,0.15);
    }
    .pupil-shine {
      position: absolute;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      top: 12px; left: 16px;
      z-index: 3;
    }
    .eyelid {
      position: absolute;
      top: -100%; left: -2px; right: -2px;
      height: 100%;
      background: #f5c6a0;
      border-radius: 0 0 50% 50%;
      z-index: 4;
      transition: top 0.08s ease-in-out;
    }
    /* JS-driven blink class */
    .eyes-container.blink .eyelid { top: 0%; }
    /* Lash element (hidden by default) */
    .lashes {
      display: none;
      position: absolute;
      top: -3px; left: 2px; right: 2px;
      height: 8px;
      z-index: 5;
    }
    .lashes span {
      position: absolute;
      width: 2px;
      height: 6px;
      background: #222;
      border-radius: 1px;
      transform-origin: bottom center;
    }
    .lashes span:nth-child(1) { left: 15%; transform: rotate(-25deg); }
    .lashes span:nth-child(2) { left: 30%; transform: rotate(-12deg); height: 7px; }
    .lashes span:nth-child(3) { left: 48%; transform: rotate(0deg); height: 8px; }
    .lashes span:nth-child(4) { left: 65%; transform: rotate(12deg); height: 7px; }
    .lashes span:nth-child(5) { left: 80%; transform: rotate(25deg); }

    @keyframes blink {
      0%, 100% { top: -100%; }
      42% { top: -100%; }
      45% { top: 0%; }
      48% { top: 0%; }
      51% { top: -100%; }
      70% { top: -100%; }
      73% { top: 0%; }
      76% { top: -100%; }
    }
    @keyframes pop-in {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ══════════════════════════════════════

       ══════════════════════════════════════ */

    .style-cute .eye { background: #fff5f8; box-shadow: inset -3px -3px 6px rgba(255,105,180,0.15), 0 2px 14px rgba(255,105,180,0.3); }
    .style-cute .eye::before { background: radial-gradient(circle at 38% 35%, #ff8ec4 0%, #e05595 40%, #b03070 100%); }

    .style-heroic .eye { background: #fff8f0; box-shadow: inset -3px -3px 6px rgba(255,100,0,0.15), 0 2px 14px rgba(255,80,0,0.35); }
    .style-heroic .eye::before { background: radial-gradient(circle at 38% 35%, #ffb347 0%, #ff6600 40%, #cc3300 100%); }

    /* Vampire - crimson on pale */
    .style-vampire .eye { background: #f0e8e8; box-shadow: 0 0 12px rgba(150,0,0,0.3); }
    .style-vampire .eye::before { background: radial-gradient(circle at 38% 35%, #cc2244 0%, #990022 40%, #550011 100%); }
    .style-vampire .eyelid { background: #d0c0c0; }

    /* Alien - huge, solid black */
    .style-alien .eye { width: 50px; height: 56px; border-radius: 45% 45% 50% 50% / 50% 50% 50% 50%; background: #050505; box-shadow: 0 0 16px rgba(100,200,100,0.3); }
    .style-alien .eye::before { width: 30px; height: 34px; background: radial-gradient(ellipse at 40% 35%, #112211 0%, #050505 60%); }
    .style-alien .eye::after { display: none; }
    .style-alien .eyelid { background: #0a0a0a; }
    .style-alien .pupil-shine { background: rgba(100,255,100,0.3); width: 8px; height: 10px; top: 12px; left: 16px; }

    /* Cyclops (single center eye variant — uses CSS to hide left eye) */
    .style-cyclops .eye:first-child { display: none; }
    .style-cyclops .eye { width: 56px; height: 56px; border-radius: 50%; background: #f5f0e0; box-shadow: 0 0 14px rgba(160,120,40,0.3); }
    .style-cyclops .eye::before { width: 30px; height: 30px; background: radial-gradient(circle at 38% 35%, #ccaa44 0%, #aa8822 40%, #775500 100%); }
    .style-cyclops .eye::after { width: 14px; height: 14px; }
    .style-cyclops .eyelid { background: #b0a070; }

    /* Possessed - glowing white-out */
    .style-possessed .eye { background: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.8); }
    .style-possessed .eye::before { background: radial-gradient(circle, #fff 0%, #eee 50%, #ddd 100%); }
    .style-possessed .eye::after { display: none; }
    .style-possessed .eyelid { background: #ccbbaa; }
    .style-possessed .pupil-shine { display: none; }

    /* ══════════════════════════════════════
       GLAM
       ══════════════════════════════════════ */

    /* Golden - regal */
    .style-golden .eye { background: #fffdf0; box-shadow: inset -3px -3px 6px rgba(180,140,0,0.12), 0 2px 14px rgba(200,160,0,0.3); }
    .style-golden .eye::before { background: radial-gradient(circle at 38% 35%, #ffd700 0%, #daa520 40%, #a07800 100%); }
    .style-golden .eyelid { background: #e8c860; }
    .style-golden .pupil-shine { background: rgba(255,245,200,0.95); }

    /* Diamond - sparkling white-blue */
    .style-diamond .eye { background: #f8faff; box-shadow: 0 0 16px rgba(180,200,255,0.4), inset 0 0 6px rgba(180,200,255,0.15); }
    .style-diamond .eye::before { background: radial-gradient(circle at 38% 35%, #c0d8ff 0%, #88aaee 40%, #5577cc 100%); }
    .style-diamond .eyelid { background: #dde4f0; }
    .style-diamond .pupil-shine { background: #fff; box-shadow: 3px 5px 0 1px rgba(255,255,255,0.7), -2px 7px 0 1px rgba(200,220,255,0.5), 6px 2px 0 0px rgba(255,255,255,0.4); }

    /* Kawaii - big round purple */
    .style-kawaii .eye { width: 48px; height: 48px; border-radius: 50%; background: #fff; }
    .style-kawaii .eye::before { width: 28px; height: 28px; background: radial-gradient(circle at 40% 35%, #7b68ee 0%, #5b48ce 40%, #3a2890 100%); }
    .style-kawaii .eye::after { width: 12px; height: 12px; }
    .style-kawaii .eyelid { background: #f0e8ff; }
    .style-kawaii .pupil-shine { width: 8px; height: 8px; top: 8px; left: 18px; box-shadow: 6px 10px 0 3px rgba(255,255,255,0.6); }

    /* Lashes - classic with visible lashes */
    .style-lashes .lashes { display: block; }
    .style-lashes .lashes span { background: #333; }
    .style-lashes .eye { background: #fff; }
    .style-lashes .eye::before { background: radial-gradient(circle at 38% 35%, #5c8abf 0%, #3a6fa0 40%, #1a3a5c 100%); }
    .style-lashes .eyelid { background: #f5c6a0; }

    /* Diva - glamorous purple + lashes */
    .style-diva .lashes { display: block; }
    .style-diva .lashes span { background: #2a0040; height: 7px; }
    .style-diva .lashes span:nth-child(3) { height: 9px; }
    .style-diva .eye { background: #fff5ff; box-shadow: 0 0 12px rgba(150,0,200,0.25); }
    .style-diva .eye::before { background: radial-gradient(circle at 38% 35%, #bb66ff 0%, #9933cc 40%, #660099 100%); }
    .style-diva .eyelid { background: #e8c8f0; }
    .style-diva .pupil-shine { box-shadow: 4px 5px 0 2px rgba(255,255,255,0.6); }

    /* Starry - dark with star sparkles */
    .style-starry .eye { background: #050510; box-shadow: 0 0 14px rgba(200,200,255,0.3); }
    .style-starry .eye::before { background: radial-gradient(circle at 38% 35%, #aabbff 0%, #6677cc 40%, #334488 100%); }
    .style-starry .eye::after { background: #000; }
    .style-starry .eyelid { background: #050510; }
    .style-starry .pupil-shine { background: #fff; box-shadow: 5px 4px 0 1px #fff, -3px 8px 0 0px rgba(200,200,255,0.7), 8px 8px 0 0px rgba(200,200,255,0.5), -5px 2px 0 0px rgba(255,255,255,0.4); }

    /* Holographic - iridescent shimmer */
    .style-holographic .eye { background: #f0f0f0; box-shadow: 0 0 14px rgba(255,100,200,0.2); }
    .style-holographic .eye::before { background: conic-gradient(from 0deg at 50% 50%, #ff6b9d, #c44dff, #44aaff, #44ffaa, #ffdd44, #ff6b9d); }
    .style-holographic .eye::after { background: radial-gradient(circle, #222 0%, #000 70%); }
    .style-holographic .eyelid { background: #e0d8e8; }
    .style-holographic .pupil-shine { background: rgba(255,255,255,0.95); }

    /* Princess - ultra girly, big lashes, pink-rose, sparkle-heavy */
    .style-princess .lashes { display: block; }
    .style-princess .lashes span { background: #660044; width: 2.5px; height: 8px; }
    .style-princess .lashes span:nth-child(1) { height: 7px; transform: rotate(-30deg); }
    .style-princess .lashes span:nth-child(2) { height: 9px; transform: rotate(-15deg); }
    .style-princess .lashes span:nth-child(3) { height: 10px; transform: rotate(0deg); }
    .style-princess .lashes span:nth-child(4) { height: 9px; transform: rotate(15deg); }
    .style-princess .lashes span:nth-child(5) { height: 7px; transform: rotate(30deg); }
    .style-princess .eye {
      width: 48px; height: 48px;
      background: #fff5fa;
      border-radius: 50%;
      box-shadow: 0 0 18px rgba(255,80,160,0.35), inset -2px -2px 4px rgba(255,105,180,0.1);
    }
    .style-princess .eye::before {
      width: 26px; height: 26px;
      background: radial-gradient(circle at 38% 35%, #ff7eb3 0%, #e84393 35%, #c23074 70%, #8e1a5a 100%);
    }
    .style-princess .eye::after { width: 11px; height: 11px; }
    .style-princess .eyelid { background: #ffb6d4; }
    .style-princess .pupil-shine {
      width: 8px; height: 8px; top: 8px; left: 18px;
      background: rgba(255,255,255,0.95);
      box-shadow:
        5px 8px 0 2px rgba(255,255,255,0.7),
        -2px 10px 0 1px rgba(255,200,230,0.6),
        8px 3px 0 1px rgba(255,220,240,0.5);
    }

    /* Thor - crackling lightning eyes */
    .style-thor .eye {
      background: #0a0a1a;
      box-shadow:
        0 0 20px rgba(100,180,255,0.6),
        0 0 40px rgba(100,180,255,0.2),
        inset 0 0 10px rgba(100,180,255,0.3);
    }
    .style-thor .eye::before {
      background: radial-gradient(circle at 38% 35%, #ffffff 0%, #88ccff 25%, #4488ff 50%, #0044cc 100%);
      box-shadow: 0 0 10px rgba(100,180,255,0.8);
    }
    .style-thor .eye::after {
      background: radial-gradient(circle, #fff 0%, #aaddff 50%, #4488ff 100%);
      box-shadow: 0 0 6px rgba(150,200,255,0.9);
    }
    .style-thor .eyelid { background: #0a0a1a; }
    .style-thor .pupil-shine {
      background: #fff;
      box-shadow: 0 0 4px 2px rgba(150,200,255,0.9);
    }

    /* Lightning bolt drawn via clip-path */
    .bolt {
      display: none;
      position: absolute;
      z-index: 2;
      opacity: 0;
    }
    .bolt svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 3px rgba(120,200,255,0.9)) drop-shadow(0 0 6px rgba(80,160,255,0.5));
    }
    .bolt svg path {
      fill: none;
      stroke: #aaddff;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .style-thor .bolt { display: block; }

    /* Flash the whole eye on strike */
    .style-thor .eye.flash {
      box-shadow:
        0 0 35px rgba(180,220,255,1),
        0 0 70px rgba(150,200,255,0.5),
        inset 0 0 16px rgba(180,220,255,0.6);
    }

    @keyframes bolt-strike {
      0% { opacity: 0; }
      5% { opacity: 1; }
      15% { opacity: 0.4; }
      25% { opacity: 1; }
      50% { opacity: 0.7; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="eyes-container" id="eyesContainer">
    <div class="eye">
      <span class="pupil-shine"></span>
      <div class="lashes"><span></span><span></span><span></span><span></span><span></span></div>
      <div class="bolt"></div>
      <div class="bolt"></div>
      <div class="eyelid"></div>
    </div>
    <div class="eye">
      <span class="pupil-shine"></span>
      <div class="lashes"><span></span><span></span><span></span><span></span><span></span></div>
      <div class="bolt"></div>
      <div class="bolt"></div>
      <div class="eyelid"></div>
    </div>
  </div>
  <script>
    const container = document.getElementById('eyesContainer');

    // Apply style from settings
    function applyStyle(style) {
      const classes = ['eyes-container'];
      if (style && style !== 'classic') classes.push('style-' + style);
      container.className = classes.join(' ');
    }

    window.api.onStyleChange(applyStyle);

    // JS-driven blink — both eyes perfectly in sync
    function doBlink() {
      container.classList.add('blink');
      setTimeout(() => {
        container.classList.remove('blink');
        // Double blink after a short pause
        setTimeout(() => {
          container.classList.add('blink');
          setTimeout(() => container.classList.remove('blink'), 120);
        }, 600);
      }, 150);
    }

    // Blink loop: first blink at ~1.2s, then every 3s
    setTimeout(() => {
      doBlink();
      setInterval(doBlink, 3000);
    }, 1200);

    // ── Thor lightning bolts ──
    // Generate a random zigzag bolt path as SVG
    function makeBoltSVG(w, h) {
      const segments = 3 + Math.floor(Math.random() * 3); // 3-5 segments
      let x = w * (0.3 + Math.random() * 0.4);
      let y = 0;
      let d = `M${x.toFixed(1)},${y.toFixed(1)}`;
      for (let i = 0; i < segments; i++) {
        y += h / segments;
        x += (Math.random() - 0.5) * w * 0.8;
        x = Math.max(1, Math.min(w - 1, x));
        d += ` L${x.toFixed(1)},${y.toFixed(1)}`;
      }
      return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg"><path d="${d}"/></svg>`;
    }

    function strikeBolt(boltEl, eyeEl) {
      const size = eyeEl.offsetWidth || 44;
      // Random position & size for the bolt
      const bw = 10 + Math.random() * 14;
      const bh = 16 + Math.random() * 20;
      const bx = Math.random() * (size - bw);
      const by = Math.random() * (size - bh) * 0.6;

      boltEl.style.left = bx + 'px';
      boltEl.style.top = by + 'px';
      boltEl.style.width = bw + 'px';
      boltEl.style.height = bh + 'px';
      boltEl.innerHTML = makeBoltSVG(bw, bh);
      boltEl.style.animation = 'none';
      boltEl.offsetHeight; // force reflow
      const duration = 150 + Math.random() * 250;
      boltEl.style.animation = `bolt-strike ${duration}ms ease-out forwards`;

      // Flash the eye
      eyeEl.classList.add('flash');
      setTimeout(() => eyeEl.classList.remove('flash'), duration * 0.6);
    }

    let lightningInterval = null;
    function startLightning() {
      if (lightningInterval) return;
      const eyes = container.querySelectorAll('.eye');
      lightningInterval = setInterval(() => {
        eyes.forEach(eye => {
          const bolts = eye.querySelectorAll('.bolt');
          // Strike 1-2 bolts randomly
          const count = Math.random() > 0.5 ? 2 : 1;
          for (let i = 0; i < count; i++) {
            if (bolts[i]) strikeBolt(bolts[i], eye);
          }
        });
      }, 400 + Math.random() * 800);
    }

    function stopLightning() {
      if (lightningInterval) {
        clearInterval(lightningInterval);
        lightningInterval = null;
      }
      container.querySelectorAll('.bolt').forEach(b => {
        b.style.animation = 'none';
        b.style.opacity = '0';
      });
    }

    // Start/stop lightning when style changes
    function checkLightning() {
      if (container.classList.contains('style-thor')) {
        startLightning();
      } else {
        stopLightning();
      }
    }

    // Patch applyStyle to also handle lightning
    const _origApply = applyStyle;
    applyStyle = function(style) {
      _origApply(style);
      checkLightning();
    };

    // Initial check
    window.api.getSettings().then(s => { applyStyle(s.style); });
  </script>
</body>
</html>
